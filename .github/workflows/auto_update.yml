name: Update CFG

on:
  schedule:
    - cron: "*/9 * * * *"
  workflow_dispatch:

jobs:
  update-whitelist-file:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r source/requirements.txt

      - name: Generate whitelist file
        run: python source/main.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add githubmirror/whitelist-vless.txt githubmirror/ru-sni-best-vless.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: update cfg"
          git push
